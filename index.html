<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Habit Chain</title>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Habit Chain" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#000000" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<style>
  :root {
    color-scheme: light dark;
    --bg: #f5f5f7;
    --card: #ffffff;
    --text: #1c1c1e;
    --muted: #6e6e73;
    --accent: #34c759;
    --accent2: #ff9500;
    --danger: #ff3b30;
    --border: #e5e5ea;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --card: #1c1c1e;
      --text: #f5f5f7;
      --muted: #98989d;
      --border: #3a3a3c;
    }
  }
  :root[data-theme="dark"] {
    --bg: #000000; --card: #1c1c1e; --text: #f5f5f7; --muted: #98989d; --border: #3a3a3c;
  }
  :root[data-theme="light"] {
    --bg: #f5f5f7; --card: #ffffff; --text: #1c1c1e; --muted: #6e6e73; --border: #e5e5ea;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px 16px 60px;
    max-width: 480px;
    margin: 0 auto;
  }
  h1 { font-size: 22px; margin: 4px 0 0; }
  .subtitle { color: var(--muted); font-size: 14px; margin: 2px 0 20px; }
  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
  }
  .stat-row { display: flex; gap: 12px; margin-bottom: 16px; }
  .stat {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    text-align: center;
  }
  .stat .num { font-size: 26px; font-weight: 700; }
  .stat .label { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .habit-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 4px;
    border-bottom: 1px solid var(--border);
  }
  .habit-row:last-child { border-bottom: none; }
  .checkbox {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    cursor: pointer;
    font-size: 14px;
    color: white;
  }
  .checkbox.checked { background: var(--accent); }
  .habit-label { flex: 1; font-size: 16px; }
  .habit-label.done { text-decoration: line-through; color: var(--muted); }
  .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 600;
  }
  .badge.new { background: rgba(52,199,89,0.15); color: var(--accent); }
  button {
    font-family: inherit;
    border: none;
    border-radius: 12px;
    padding: 13px 18px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
  }
  button.primary { background: var(--accent); color: white; }
  button.secondary { background: var(--border); color: var(--text); }
  input[type="text"] {
    width: 100%;
    padding: 12px 14px;
    font-size: 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    margin: 10px 0 16px;
  }
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex; align-items: flex-end;
    z-index: 50;
  }
  .sheet {
    background: var(--card);
    width: 100%;
    border-radius: 20px 20px 0 0;
    padding: 22px 20px 30px;
  }
  .sheet h2 { margin: 0 0 6px; font-size: 19px; }
  .sheet p { color: var(--muted); font-size: 14px; margin: 0 0 4px; line-height: 1.4; }
  .radio-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 4px;
    border-bottom: 1px solid var(--border);
  }
  details { margin-top: 4px; }
  summary {
    cursor: pointer;
    font-size: 14px;
    color: var(--muted);
    padding: 6px 0;
    font-weight: 600;
  }
  .history-day {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .history-day .d { font-weight: 600; margin-bottom: 3px; }
  .history-day .h { color: var(--muted); }
  .hidden { display: none !important; }
  .empty-state { text-align: center; padding: 30px 10px; color: var(--muted); }
  .empty-state-small { color: var(--muted); font-size: 13px; padding: 10px 2px; }

  .tab-bar {
    display: flex; gap: 4px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 4px;
    margin-bottom: 16px;
  }
  .tab-btn {
    flex: 1;
    background: transparent;
    color: var(--muted);
    border-radius: 10px;
    padding: 10px;
    font-size: 14px;
  }
  .tab-btn.active { background: var(--accent); color: #ffffff; }

  .section-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin: 0 0 12px;
  }

  .heatmap { display: flex; flex-wrap: wrap; gap: 4px; }
  .heatmap .cell {
    width: 15px; height: 15px;
    border-radius: 4px;
    background: var(--border);
    cursor: pointer;
  }
  .heatmap .cell.done { background: var(--accent); }
  .heatmap .cell.missed { background: var(--accent2); }
  .heatmap .cell.today { background: var(--card); border: 2px dashed var(--muted); }

  .legend-row {
    display: flex; flex-wrap: wrap; gap: 14px;
    margin-top: 12px;
    font-size: 12px;
    color: var(--muted);
    align-items: center;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 3px;
    display: inline-block;
    margin-right: 5px;
    vertical-align: middle;
  }

  .habit-stat-row { padding: 10px 2px; border-bottom: 1px solid var(--border); }
  .habit-stat-row:last-child { border-bottom: none; }
  .habit-stat-top {
    display: flex; justify-content: space-between;
    font-size: 14px; margin-bottom: 6px;
  }
  .habit-stat-top .pct { color: var(--muted); font-size: 13px; }
  .bar-track { background: var(--border); border-radius: 6px; height: 8px; overflow: hidden; }
  .bar-fill { background: var(--accent); height: 100%; border-radius: 6px; }
  .dropped-tag {
    font-size: 10px;
    padding: 1px 7px;
    border-radius: 20px;
    font-weight: 600;
    background: rgba(255,149,0,0.15);
    color: var(--accent2);
    margin-left: 6px;
  }

  .chart-tooltip {
    position: fixed;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 10px;
    font-size: 12px;
    pointer-events: none;
    z-index: 60;
    box-shadow: 0 4px 14px rgba(0,0,0,0.3);
    display: none;
  }
  .chart-tooltip .tt-date { font-weight: 600; margin-bottom: 2px; }
  .chart-tooltip .tt-val { color: var(--muted); }

  .day-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .nav-btn {
    width: 42px; flex: 0 0 42px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 20px;
    line-height: 1;
    padding: 10px 0;
    border-radius: 12px;
  }
  .nav-btn:disabled { opacity: 0.3; }
  input[type="date"] {
    flex: 1;
    margin: 0;
    padding: 11px 10px;
    font-size: 15px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
  }
  .past-banner {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px;
    background: rgba(255,149,0,0.12);
    color: var(--accent2);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 14px;
  }
  .past-banner button {
    width: auto;
    background: transparent;
    color: var(--accent2);
    text-decoration: underline;
    padding: 0;
    font-size: 13px;
  }
  .remove-x {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: transparent;
    color: var(--muted);
    font-size: 16px;
    padding: 0;
    flex: 0 0 26px;
  }
  .add-habit-row {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 4px 2px;
  }
  .add-habit-row button {
    background: transparent;
    color: var(--accent);
    font-weight: 600;
    text-align: left;
    padding: 6px 4px;
  }
</style>
</head>
<body>

<h1>🔗 Habit Chain</h1>
<div class="subtitle" id="dateLabel"></div>

<div id="app"></div>

<script>
const STORAGE_KEY = 'habitChainState_v1';

function pad(n) { return n < 10 ? '0' + n : '' + n; }
function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
}
function addDay(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const nd = new Date(y, m - 1, d + 1);
  return nd.getFullYear() + '-' + pad(nd.getMonth() + 1) + '-' + pad(nd.getDate());
}
function formatPretty(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  return dt.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
}

function loadState() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) return JSON.parse(raw);
  return { habits: [], days: {} };
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

let state = loadState();

function createDayRecord(dateStr, habits) {
  const completions = {};
  habits.forEach(h => completions[h] = false);
  state.days[dateStr] = { habitsSnapshot: [...habits], completions, finalized: false, outcome: null };
}

function finalizeRecord(dateStr) {
  const rec = state.days[dateStr];
  if (rec.finalized) return;
  const allDone = rec.habitsSnapshot.length === 0 ? true : rec.habitsSnapshot.every(h => rec.completions[h]);
  rec.finalized = true;
  rec.outcome = allDone ? 'done' : 'missed';
}

function missedHabits(rec) {
  return rec.habitsSnapshot.filter(h => !rec.completions[h]);
}

// ---- Catch-up state machine ----
function catchUp() {
  const today = todayStr();
  const dates = Object.keys(state.days).sort();
  if (dates.length === 0) { renderOnboarding(); return; }
  const lastDate = dates[dates.length - 1];
  if (lastDate === today) { renderApp(); return; }
  finalizeRecord(lastDate);
  advance(lastDate);
}

function advance(cursorDate) {
  const today = todayStr();
  const rec = state.days[cursorDate];
  const nextDate = addDay(cursorDate);
  const isIntoToday = nextDate === today;

  if (rec.outcome === 'done') {
    renderAddHabitModal(cursorDate, (newHabitName) => {
      const newHabits = [...state.habits, newHabitName];
      createDayRecord(nextDate, newHabits);
      state.habits = newHabits;
      saveState();
      if (nextDate === today) { renderApp(); } else { finalizeRecord(nextDate); advance(nextDate); }
    });
    return;
  }

  // outcome === 'missed'
  if (state.habits.length <= 1) {
    // floor reached, nothing to remove
    createDayRecord(nextDate, state.habits);
    saveState();
    if (nextDate === today) { renderApp(); } else { finalizeRecord(nextDate); advance(nextDate); }
    return;
  }

  if (isIntoToday) {
    renderChooseRemovalModal(cursorDate, (habitToRemove) => {
      const newHabits = state.habits.filter(h => h !== habitToRemove);
      createDayRecord(nextDate, newHabits);
      state.habits = newHabits;
      saveState();
      renderApp();
    });
  } else {
    // silently apply default: remove most recently added
    const removed = state.habits[state.habits.length - 1];
    const newHabits = state.habits.filter(h => h !== removed);
    createDayRecord(nextDate, newHabits);
    state.habits = newHabits;
    saveState();
    finalizeRecord(nextDate);
    advance(nextDate);
  }
}

// ---- Rendering ----
const app = document.getElementById('app');
let activeTab = 'today';
let viewedDate = null;

function setDateLabel() {
  document.getElementById('dateLabel').textContent = formatPretty(todayStr());
}

function renderOnboarding() {
  setDateLabel();
  app.innerHTML = `
    <div class="card">
      <h2 style="margin-top:0">Start your chain 🔥</h2>
      <p style="color:var(--muted); font-size:14px; line-height:1.5;">
        Pick one habit to start with. Complete it every day to unlock a new habit to add on top.
        Miss one, and a habit drops off the list.
      </p>
      <input type="text" id="firstHabitInput" placeholder="e.g. Go to the gym" />
      <button class="primary" id="startBtn">Start</button>
    </div>
  `;
  document.getElementById('startBtn').onclick = () => {
    const val = document.getElementById('firstHabitInput').value.trim();
    if (!val) return;
    state.habits = [val];
    createDayRecord(todayStr(), state.habits);
    saveState();
    renderApp();
  };
}

function renderApp() {
  setDateLabel();
  const today = todayStr();
  let rec = state.days[today];
  if (!rec) { createDayRecord(today, state.habits); rec = state.days[today]; saveState(); }
  if (viewedDate === null || !state.days[viewedDate]) viewedDate = today;

  app.innerHTML = `
    <div class="tab-bar">
      <button class="tab-btn ${activeTab === 'today' ? 'active' : ''}" data-tab="today">Today</button>
      <button class="tab-btn ${activeTab === 'stats' ? 'active' : ''}" data-tab="stats">Stats</button>
    </div>
    <div id="tabContent"></div>
    <div class="chart-tooltip" id="chartTooltip"></div>
  `;

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = () => { activeTab = btn.dataset.tab; renderApp(); };
  });

  const content = document.getElementById('tabContent');
  if (activeTab === 'today') {
    content.innerHTML = renderTodayHtml(today);
    attachTodayHandlers(today);
  } else {
    const statsData = computeStats();
    content.innerHTML = renderStatsHtml(statsData);
    attachLineChartEvents(statsData.series);
    attachHeatmapEvents(statsData.series);
  }
}

function renderTodayHtml(today) {
  const allDates = Object.keys(state.days).sort();
  const viewRec = state.days[viewedDate];
  const isToday = viewedDate === today;
  const finalizedDays = allDates.filter(d => state.days[d].finalized).sort().reverse();

  const rows = viewRec.habitsSnapshot.map(h => {
    const checked = viewRec.completions[h];
    return `
      <div class="habit-row">
        <div class="checkbox ${checked ? 'checked' : ''}" data-habit="${encodeURIComponent(h)}">${checked ? '✓' : ''}</div>
        <div class="habit-label ${checked ? 'done' : ''}">${h}</div>
        ${isToday ? `<button class="remove-x" data-remove="${encodeURIComponent(h)}">✕</button>` : ''}
      </div>
    `;
  }).join('');

  const historyHtml = finalizedDays.length === 0 ? `<div class="empty-state">No history yet — finish today to start your log.</div>` :
    finalizedDays.map(d => {
      const r = state.days[d];
      const badge = r.outcome === 'done' ? '✅ Leveled up' : '⚠️ Habit dropped';
      return `<div class="history-day">
        <div class="d">${formatPretty(d)} · ${badge}</div>
        <div class="h">${r.habitsSnapshot.join(', ')}</div>
      </div>`;
    }).join('');

  const idx = allDates.indexOf(viewedDate);
  const dayNav = `
    <div class="day-nav">
      <button class="nav-btn" id="prevDayBtn" ${idx > 0 ? '' : 'disabled'}>‹</button>
      <input type="date" id="dayPicker" value="${viewedDate}" min="${allDates[0]}" max="${today}" />
      <button class="nav-btn" id="nextDayBtn" ${idx < allDates.length - 1 ? '' : 'disabled'}>›</button>
    </div>
  `;

  const pastBanner = isToday ? '' : `
    <div class="past-banner">
      <span>Viewing ${formatPretty(viewedDate)} — edits recalculate later days</span>
      <button id="jumpTodayBtn">Jump to today</button>
    </div>
  `;

  const addHabitRow = isToday ? `
    <div class="add-habit-row">
      <button id="addHabitNowBtn">+ Add another habit</button>
    </div>
  ` : '';

  const saveRow = isToday ? '' : `
    <button class="primary" id="saveEditBtn" style="margin-top:14px;">Save changes to this day</button>
  `;

  return `
    ${dayNav}
    ${pastBanner}
    <div class="stat-row">
      <div class="stat"><div class="num">${viewRec.habitsSnapshot.length}</div><div class="label">${isToday ? 'Active habits' : 'Habits that day'}</div></div>
      <div class="stat"><div class="num">${finalizedDays.length + 1}</div><div class="label">Day</div></div>
    </div>
    <div class="card">
      ${rows}
      ${addHabitRow}
      ${saveRow}
    </div>
    <details>
      <summary>History (${finalizedDays.length})</summary>
      <div class="card">${historyHtml}</div>
    </details>
  `;
}

function attachTodayHandlers(today) {
  const viewRec = state.days[viewedDate];
  const isToday = viewedDate === today;

  document.querySelectorAll('.checkbox').forEach(el => {
    el.onclick = () => {
      const habit = decodeURIComponent(el.dataset.habit);
      viewRec.completions[habit] = !viewRec.completions[habit];
      saveState();
      renderApp();
    };
  });

  document.querySelectorAll('.remove-x').forEach(el => {
    el.onclick = () => {
      const habit = decodeURIComponent(el.dataset.remove);
      if (!confirm(`Remove "${habit}" from today's list?`)) return;
      state.habits = state.habits.filter(h => h !== habit);
      viewRec.habitsSnapshot = viewRec.habitsSnapshot.filter(h => h !== habit);
      delete viewRec.completions[habit];
      saveState();
      renderApp();
    };
  });

  const addBtn = document.getElementById('addHabitNowBtn');
  if (addBtn) {
    addBtn.onclick = () => {
      renderManualAddHabitModal((newHabitName) => {
        state.habits = [...state.habits, newHabitName];
        viewRec.habitsSnapshot = [...state.habits];
        viewRec.completions[newHabitName] = false;
        saveState();
        renderApp();
      });
    };
  }

  const prevBtn = document.getElementById('prevDayBtn');
  if (prevBtn) prevBtn.onclick = () => {
    const allDates = Object.keys(state.days).sort();
    const idx = allDates.indexOf(viewedDate);
    if (idx > 0) { viewedDate = allDates[idx - 1]; renderApp(); }
  };

  const nextBtn = document.getElementById('nextDayBtn');
  if (nextBtn) nextBtn.onclick = () => {
    const allDates = Object.keys(state.days).sort();
    const idx = allDates.indexOf(viewedDate);
    if (idx < allDates.length - 1) { viewedDate = allDates[idx + 1]; renderApp(); }
  };

  const picker = document.getElementById('dayPicker');
  if (picker) picker.onchange = () => {
    if (state.days[picker.value]) { viewedDate = picker.value; renderApp(); }
  };

  const jumpBtn = document.getElementById('jumpTodayBtn');
  if (jumpBtn) jumpBtn.onclick = () => { viewedDate = today; renderApp(); };

  const saveBtn = document.getElementById('saveEditBtn');
  if (saveBtn) saveBtn.onclick = () => { saveEditedDay(viewedDate); };
}

function renderManualAddHabitModal(onSubmit) {
  app.insertAdjacentHTML('beforeend', `
    <div class="overlay" id="modalOverlay">
      <div class="sheet">
        <h2>Add a habit</h2>
        <p>This adds to today's list right away.</p>
        <input type="text" id="manualHabitInput" placeholder="e.g. Read 10 pages" />
        <button class="primary" id="manualAddHabitBtn">Add habit</button>
      </div>
    </div>
  `);
  document.getElementById('manualAddHabitBtn').onclick = () => {
    const val = document.getElementById('manualHabitInput').value.trim();
    if (!val) return;
    document.getElementById('modalOverlay').remove();
    onSubmit(val);
  };
}

function saveEditedDay(dateStr) {
  const rec = state.days[dateStr];
  const oldOutcome = rec.outcome;
  const allDone = rec.habitsSnapshot.length === 0 ? true : rec.habitsSnapshot.every(h => rec.completions[h]);
  const newOutcome = allDone ? 'done' : 'missed';

  if (newOutcome === oldOutcome) {
    saveState();
    renderApp();
    return;
  }

  const allDates = Object.keys(state.days).sort();
  const idx = allDates.indexOf(dateStr);
  allDates.slice(idx + 1).forEach(d => delete state.days[d]);

  rec.outcome = newOutcome;
  state.habits = [...rec.habitsSnapshot];
  saveState();

  viewedDate = null;
  advance(dateStr);
}

// ---- Stats ----
function computeStats() {
  const dates = Object.keys(state.days).sort();
  const finalizedDates = dates.filter(d => state.days[d].finalized);

  const series = dates.map(d => ({
    date: d,
    count: state.days[d].habitsSnapshot.length,
    outcome: state.days[d].outcome,
  }));

  const totalDays = dates.length;

  let bestStreak = 0, run = 0;
  finalizedDates.forEach(d => {
    if (state.days[d].outcome === 'done') { run++; bestStreak = Math.max(bestStreak, run); }
    else { run = 0; }
  });

  let currentStreak = 0;
  for (let i = finalizedDates.length - 1; i >= 0; i--) {
    if (state.days[finalizedDates[i]].outcome === 'done') currentStreak++;
    else break;
  }

  const successDays = finalizedDates.filter(d => state.days[d].outcome === 'done').length;
  const successRate = finalizedDates.length ? Math.round((successDays / finalizedDates.length) * 100) : null;

  const habitStats = {};
  dates.forEach(d => {
    const r = state.days[d];
    r.habitsSnapshot.forEach(h => {
      if (!habitStats[h]) habitStats[h] = { daysActive: 0, daysCompleted: 0 };
      habitStats[h].daysActive++;
      if (r.completions[h]) habitStats[h].daysCompleted++;
    });
  });

  return { series, totalDays, bestStreak, currentStreak, successRate, habitStats };
}

function renderLineChart(series) {
  if (series.length < 2) {
    return `<div class="empty-state-small">Keep tracking for a few days to see your trend line.</div>`;
  }
  const w = 300, h = 120, padX = 8, padY = 14;
  const maxCount = Math.max(...series.map(s => s.count));
  const minCount = 1;
  const range = Math.max(maxCount - minCount, 1);
  const stepX = (w - padX * 2) / (series.length - 1);
  const points = series.map((s, i) => ({
    x: padX + i * stepX,
    y: h - padY - ((s.count - minCount) / range) * (h - padY * 2),
    ...s,
  }));
  const pathD = points.map((p, i) => (i === 0 ? 'M' : 'L') + p.x.toFixed(1) + ',' + p.y.toFixed(1)).join(' ');
  const dots = points.map((p) => `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3" fill="#34c759"></circle>`).join('');
  const hitTargets = points.map((p, i) => `<circle class="chart-pt" data-i="${i}" cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="9" fill="transparent"></circle>`).join('');

  return `
    <svg viewBox="0 0 ${w} ${h}" width="100%" height="140" id="lineChartSvg">
      <path d="${pathD}" fill="none" stroke="#34c759" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
      ${dots}
      ${hitTargets}
    </svg>
  `;
}

function renderHeatmap(series) {
  const cells = series.map((s, i) => {
    let cls = 'cell';
    let label = 'In progress';
    if (s.outcome === 'done') { cls += ' done'; label = 'Completed'; }
    else if (s.outcome === 'missed') { cls += ' missed'; label = 'Missed'; }
    else { cls += ' today'; }
    return `<div class="${cls}" data-i="${i}" data-label="${label}"></div>`;
  }).join('');

  return `
    <div class="heatmap" id="heatmapGrid">${cells}</div>
    <div class="legend-row">
      <span><span class="legend-dot" style="background:var(--accent)"></span>Completed</span>
      <span><span class="legend-dot" style="background:var(--accent2)"></span>Missed</span>
      <span><span class="legend-dot" style="background:var(--card); border:2px dashed var(--muted)"></span>In progress</span>
    </div>
  `;
}

function renderHabitStats(habitStats) {
  const entries = Object.entries(habitStats);
  if (entries.length === 0) return `<div class="empty-state-small">No habit data yet.</div>`;

  const activeSet = new Set(state.habits);
  const activeOnes = state.habits.filter(h => habitStats[h]).map(h => [h, habitStats[h]]);
  const droppedOnes = entries.filter(([h]) => !activeSet.has(h));
  const ordered = [...activeOnes, ...droppedOnes];

  return ordered.map(([h, st]) => {
    const pct = st.daysActive ? Math.round((st.daysCompleted / st.daysActive) * 100) : 0;
    const tag = activeSet.has(h) ? '' : `<span class="dropped-tag">dropped</span>`;
    return `
      <div class="habit-stat-row">
        <div class="habit-stat-top">
          <span>${h}${tag}</span>
          <span class="pct">${pct}% · ${st.daysActive} day${st.daysActive === 1 ? '' : 's'}</span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
      </div>
    `;
  }).join('');
}

function renderStatsHtml(stats) {
  return `
    <div class="stat-row">
      <div class="stat"><div class="num">${state.habits.length}</div><div class="label">Active habits</div></div>
      <div class="stat"><div class="num">${stats.totalDays}</div><div class="label">Days tracked</div></div>
    </div>
    <div class="stat-row">
      <div class="stat"><div class="num">${stats.currentStreak}</div><div class="label">Current streak</div></div>
      <div class="stat"><div class="num">${stats.bestStreak}</div><div class="label">Best streak</div></div>
    </div>
    <div class="card">
      <div class="section-title">Chain growth</div>
      ${renderLineChart(stats.series)}
    </div>
    <div class="card">
      <div class="section-title">Daily history</div>
      ${renderHeatmap(stats.series)}
    </div>
    <div class="card">
      <div class="section-title">Per-habit completion</div>
      ${renderHabitStats(stats.habitStats)}
    </div>
  `;
}

function showChartTooltip(x, y, html) {
  const tooltip = document.getElementById('chartTooltip');
  if (!tooltip) return;
  tooltip.innerHTML = html;
  tooltip.style.display = 'block';
  tooltip.style.left = Math.min(x + 14, window.innerWidth - 170) + 'px';
  tooltip.style.top = Math.max(y - 44, 8) + 'px';
}
function hideChartTooltip() {
  const tooltip = document.getElementById('chartTooltip');
  if (tooltip) tooltip.style.display = 'none';
}

function attachLineChartEvents(series) {
  document.querySelectorAll('#lineChartSvg .chart-pt').forEach(c => {
    const i = +c.dataset.i;
    const s = series[i];
    const html = `<div class="tt-date">${formatPretty(s.date)}</div><div class="tt-val">${s.count} active habit${s.count === 1 ? '' : 's'}</div>`;
    c.addEventListener('mouseenter', e => showChartTooltip(e.clientX, e.clientY, html));
    c.addEventListener('mousemove', e => showChartTooltip(e.clientX, e.clientY, html));
    c.addEventListener('mouseleave', hideChartTooltip);
    c.addEventListener('click', e => showChartTooltip(e.clientX, e.clientY, html));
  });
}

function attachHeatmapEvents(series) {
  document.querySelectorAll('#heatmapGrid .cell').forEach(c => {
    const i = +c.dataset.i;
    const s = series[i];
    const html = `<div class="tt-date">${formatPretty(s.date)}</div><div class="tt-val">${c.dataset.label}</div>`;
    c.addEventListener('mouseenter', e => showChartTooltip(e.clientX, e.clientY, html));
    c.addEventListener('mousemove', e => showChartTooltip(e.clientX, e.clientY, html));
    c.addEventListener('mouseleave', hideChartTooltip);
    c.addEventListener('click', e => showChartTooltip(e.clientX, e.clientY, html));
  });
}

function renderAddHabitModal(dateStr, onSubmit) {
  const rec = state.days[dateStr];
  app.insertAdjacentHTML('beforeend', `
    <div class="overlay" id="modalOverlay">
      <div class="sheet">
        <h2>🎉 Nice work on ${formatPretty(dateStr)}!</h2>
        <p>You completed: ${rec.habitsSnapshot.join(', ')}.</p>
        <p>What's the next habit to add on top?</p>
        <input type="text" id="newHabitInput" placeholder="e.g. Meditate" />
        <button class="primary" id="addHabitBtn">Add habit</button>
      </div>
    </div>
  `);
  document.getElementById('addHabitBtn').onclick = () => {
    const val = document.getElementById('newHabitInput').value.trim();
    if (!val) return;
    document.getElementById('modalOverlay').remove();
    onSubmit(val);
  };
}

function renderChooseRemovalModal(dateStr, onSubmit) {
  const rec = state.days[dateStr];
  const missed = missedHabits(rec);
  const mostRecent = state.habits[state.habits.length - 1];
  const options = state.habits.map(h => `
    <label class="radio-row">
      <input type="radio" name="removeChoice" value="${encodeURIComponent(h)}" ${h === mostRecent ? 'checked' : ''} />
      <span>${h}</span>
    </label>
  `).join('');
  app.insertAdjacentHTML('beforeend', `
    <div class="overlay" id="modalOverlay">
      <div class="sheet">
        <h2>⚠️ Missed on ${formatPretty(dateStr)}</h2>
        <p>You didn't complete: ${missed.join(', ')}.</p>
        <p>Pick a habit to drop (defaults to the newest):</p>
        ${options}
        <button class="primary" id="confirmRemoveBtn" style="margin-top:14px;">Confirm</button>
      </div>
    </div>
  `);
  document.getElementById('confirmRemoveBtn').onclick = () => {
    const checked = document.querySelector('input[name="removeChoice"]:checked');
    const habit = decodeURIComponent(checked.value);
    document.getElementById('modalOverlay').remove();
    onSubmit(habit);
  };
}

catchUp();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
